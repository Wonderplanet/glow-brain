      - name: Heal
      - name: SummonCost

  - name: EncyclopediaType
    params:
      - name: Artwork
      - name: Unit
      - name: Emblem
      - name: EnemyDiscovery

  - name: ArtworkEffectType
    params:
      - name: AttackPowerUp
      - name: HpUp
      - name: ResummonSpeedUp
      - name: SpecialAttackChargeSpeedUp
      - name: InitialLeaderPointUp
      - name: JumbleRushChargeSpeedUp
      - name: JumbleRushDamageUp

  - name: ArtworkEffectTargetRuleType
    params:
