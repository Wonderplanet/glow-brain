        type: ArtworkEffectTargetRuleType
      - name: conditionValue
        type: string

  - name: MstArtworkEffectActivationRule
    obscure: true
    params:
      - name: id
        type: string
      - name: mstArtworkEffectId
        type: string
      - name: conditionType
